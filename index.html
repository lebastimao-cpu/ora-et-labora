<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Ora et Labora</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b1220" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, system-ui;
      background: #020617;
      color: #e5e7eb;
    }
    header {
      padding: 1rem;
      text-align: center;
      background: linear-gradient(#0b1220, #020617);
      border-bottom: 1px solid #1f2937;
    }
    header h1 {
      margin: 0;
      font-size: 1.4rem;
      font-weight: 600;
    }
    header p {
      margin: .3rem 0 0;
      color: #facc15;
      font-size: .85rem;
    }
    main {
      padding: 1rem;
      margin-bottom: 4.5rem;
    }
    .info {
      background: #020617;
      border: 1px solid #1f2937;
      border-radius: 10px;
      padding: .7rem;
      font-size: .8rem;
      color: #facc15;
      margin-bottom: 1rem;
    }
    .card {
      background: #020617;
      border: 1px solid #1f2937;
      border-radius: 14px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #020617;
      border-top: 1px solid #1f2937;
      display: flex;
    }
    nav button {
      flex: 1;
      padding: .8rem 0;
      background: none;
      border: none;
      color: #9ca3af;
      font-size: .7rem;
    }
    nav button.active {
      color: #facc15;
    }
  </style>
</head>

<body>
<header>
  <h1>Ora et Labora</h1>
  <p id="santo">Carregando santo do dia…</p>
</header>

<main>
  <div class="card">
    <h2>📅 Liturgia de Hoje</h2>
    <p id="data"></p>
    <p>⛪ Liturgia Católica Romana</p>
  </div>
</main>

<nav>
  <button class="active">📖<br>Leituras</button>
  <button>🙏<br>Orações</button>
  <button>📅<br>Calendário</button>
  <button>⚙️<br>Config</button>
</nav>

<script>
  // Data
  document.getElementById("data").innerText =
    new Date().toLocaleDateString("pt-BR", { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });

  // Santo do dia (fonte pública simples)
  const hoje = new Date().toISOString().split("T")[0];

  fetch("https://raw.githubusercontent.com/ldb/martyrology/master/santos.json")
    .then(r => r.json())
    .then(lista => {
      const santo = lista[hoje];
      if (santo) {
        document.getElementById("santo").innerText =
          "🙏 Santo do dia: " + santo;
        localStorage.setItem("santo_do_dia", santo);
      } else {
        usarCache();
      }
    })
    .catch(usarCache);

  function usarCache() {
    const cache = localStorage.getItem("santo_do_dia");
    document.getElementById("santo").innerText =
      cache
        ? "🙏 Santo do dia: " + cache + " (offline)"
        : "🙏 Santo do dia (offline)";
  }
</script>
</body>
</html>
