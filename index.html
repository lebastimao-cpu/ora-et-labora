<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ora et Labora</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0b1220">

<style>
body {
  margin: 0;
  font-family: -apple-system, system-ui;
  background: #020617;
  color: #e5e7eb;
}
header {
  padding: 1rem;
  text-align: center;
  background: linear-gradient(#0b1220, #020617);
  border-bottom: 1px solid #1f2937;
}
header h1 {
  margin: 0;
  font-size: 1.4rem;
}
header p {
  margin: .3rem 0 0;
  font-size: .85rem;
  color: #facc15;
}

main {
  padding: 1rem;
  margin-bottom: 4.5rem;
}

.card {
  background: #020617;
  border: 1px solid #1f2937;
  border-radius: 14px;
  margin-bottom: 1rem;
}

.card-header {
  padding: 1rem;
  font-weight: 600;
  cursor: pointer;
}

.card-content {
  padding: 0 1rem 1rem;
  font-size: .9rem;
  color: #d1d5db;
  display: none;
}

.card.open .card-content {
  display: block;
}

nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #020617;
  border-top: 1px solid #1f2937;
  display: flex;
}

nav button {
  flex: 1;
  padding: .8rem 0;
  border: none;
  background: none;
  color: #9ca3af;
  font-size: .7rem;
}

nav button.active {
  color: #facc15;
  font-weight: 600;
}
</style>
</head>

<body>

<header>
  <h1>Ora et Labora</h1>
  <p>Liturgia Católica — Hoje</p>
</header>

<main id="app"></main>

<nav>
  <button data-tela="hoje" class="active">🏠<br>Hoje</button>
  <button data-tela="oracoes">🙏<br>Orações</button>
  <button data-tela="config">⚙️<br>Config</button>
</nav>

<script>

  leitura: {
    ref: "Atos 8,1b-8",
    resumo: "A perseguição dispersa os cristãos, mas fortalece a missão da Igreja."
  },
  salmo: {
    antifona: "Aclamai o Senhor Deus, toda a terra",
    sentido: "Confiança e alegria em Deus, mesmo nas dificuldades."
  },
  evangelho: {
    ref: "João 6,35-40",
    resumo: "Jesus é o Pão da Vida, que sacia a fome espiritual."
  }
};

function trocar(tela) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
  document.querySelector(`nav button[data-tela='${tela}']`).classList.add("active");

  if (tela === "hoje") {
    app.innerHTML = `
      <div class="card open">
        <div class="card-header">📜 Primeira Leitura (${liturgiaHoje.leitura.ref})</div>
        <div class="card-content">${liturgiaHoje.leitura.resumo}</div>
      </div>

      <div class="card">
        <div class="card-header">🎵 Salmo</div>
        <div class="card-content">
          <strong>${liturgiaHoje.salmo.antifona}</strong><br><br>
          ${liturgiaHoje.salmo.sentido}
        </div>
      </div>

      <div class="card">
        <div class="card-header">📖 Evangelho (${liturgiaHoje.evangelho.ref})</div>
        <div class="card-content">${liturgiaHoje.evangelho.resumo}</div>
      </div>
    `;
    ativarToggles();
  }

      <div class="card open">
        <div class="card-header">Pai Nosso</div>
        <div class="card-content">
          Pai nosso que estais nos céus,<br>
          santificado seja o vosso nome...
        </div>
      </div>
    `;
  }
