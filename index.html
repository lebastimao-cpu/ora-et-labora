<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Ora et Labora</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1f2937" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, system-ui;
      margin: 0;
      background: #f5f5f5;
      color: #111;
    }
    header {
      background: #1f2937;
      color: white;
      padding: 1rem;
      text-align: center;
    }
    main {
      padding: 1rem;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background: #111;
        color: #e5e7eb;
      }
      .card {
        background: #1f2937;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Ora et Labora</h1>
    <p>Liturgia • Oração • Vida</p>
  </header>

  <main>
    <div class="card">
      <h2>Liturgia de Hoje</h2>
      <p>📅 <span id="data"></span></p>
      <p>⛪ Liturgia Católica Romana (CNBB)</p>
      <p>🙏 Santo do dia: <em>(será exibido online)</em></p>
    </div>

    <div class="card">
      <h2>Oração</h2>
      <p>
        Pai nosso que estais nos céus,<br>
        santificado seja o vosso nome...
      </p>
    </div>
  </main>

  <script>
    document.getElementById("data").innerText =
      new Date().toLocaleDateString("pt-BR");
  </script>
</body>
</html>
